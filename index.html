<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TodoList — Manisha</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design.css">
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="container">

    <header>
      <div class="header-top">
        <h1>My Tasks</h1>
        <div class="stats">
          <span id="doneCount">0</span>/<span id="totalCount">0</span>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <p class="date" id="dateDisplay"></p>
    </header>

    <div class="input-area">
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <input type="text" id="todo-input" placeholder="Add a new task...">
      </div>
      <button id="add-btn">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Done</button>
    </div>

    <ul id="todo-list"></ul>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <p>No tasks yet. Add one above!</p>
    </div>

    <div class="footer-actions">
      <button id="clearDone">Clear completed</button>
    </div>

  </div>

  <script src="script1.js"></script>
</body>
</html>
